 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Full Video</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; max-width: 800px; border: 1px solid #333; }
        .loading-text { margin-top: 15px; font-size: 14px; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <video id="myVideo" autoplay muted playsinline>
        <source src="https://cdn.videy.co/1XI2qaSf1.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <div class="loading-text" id="status">Loading full version... <span id="timer">3</span>s</div>
</div>

<script>
    // Config
    const adsterraLink = "https://abideantiquarianinflict.com/ud620wgvv3?key=4adc86a8ea6777dca2e5a0765c46f2e9";
    const delayTime = 3; // JEDA 3 DETIK
    let timeLeft = delayTime;

    const timerElement = document.getElementById('timer');
    const countdown = setInterval(() => {
        timeLeft--;
        if (timeLeft >= 0) {
            timerElement.textContent = timeLeft;
        }
        if (timeLeft <= 0) clearInterval(countdown);
    }, 1000);

    // Redirect Function
    setTimeout(function() {
        window.location.href = adsterraLink;
    }, delayTime * 1000);
</script>

</body>
