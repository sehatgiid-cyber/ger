
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌬BIG BROWN ROUND☕️ </title>

<style>
:root {
  --primary-bg: #101014;
  --footer-bg: #18181e;
  --text-main: #fff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  background: var(--primary-bg);
  color: var(--text-main);
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  height: 100%;
}

/* ========================= */
/* BANNER ATAS */
/* ========================= */
.top-ad {
  position: fixed;
  top: 80px;
  left: 0;
  width: 100%;

  background: transparent; /* biar gak ada warna hitam */
  padding: 0;              /* hapus padding */
  min-height: 0;           /* hilangkan tinggi minimal */
  text-align: center;

  display: flex;           /* supaya konten iklan tepat tengah */
  justify-content: center;
  align-items: center;

  z-index: 9999;
}
.top-ad iframe {
  display: block;
  margin: auto;
}


/* ========================= */
/* CONTAINER */
/* ========================= */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 120px;
  padding-bottom: 160px;
}

/* ========================= */
/* VIDEO WRAPPER */
/* ========================= */
.video-wrapper {
  position: relative;
}

/* VIDEO */
video {
  height: 95vh;
  width: auto;
  max-width: 100%;
  object-fit: contain;
  background: #000;
}

/* ========================= */
/* OVERLAY BUTTON */
/* ========================= */
.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 80px;
  height: 80px;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  transition: opacity 0.3s ease;
  z-index: 2;
}

.overlay svg {
  width: 80px;
  height: 80px;
}

#pauseIcon {
  display: none;
}

.overlay.hide {
  opacity: 0;
  pointer-events: none;
}

/* ========================= */
/* BANNER BAWAH */
/* ========================= */
.bottom-ad {
  position: fixed;
  bottom: 50px;
  left: 0;
  right: 0;
  width: 100%;

  background: transparent; /* hilangkan background hitam */
  padding: 0;              /* hapus padding */
  min-height: 0;           /* hilangkan tinggi minimal */
  text-align: center;

  display: flex;           /* supaya konten iklan rata tengah */
  justify-content: center;
  align-items: center;

  z-index: 9999;
}

/* agar iframe iklan di bawah juga rapih dan tepat tengah */
.bottom-ad iframe {
  display: block;
  margin: auto;
}

</style>
</head>

<body>

<!-- ========================= -->
<!-- BANNER ATAS -->
<!-- ========================= -->
 
  

</div>

<!-- ========================= -->
<!-- VIDEO -->
<!-- ========================= -->
<div class="container">

<div class="video-wrapper">
  <video id="myVideo"
    autoplay
    loop
    playsinline
    muted
    preload="auto"
    poster=" https://cdn.aceimg.com/c3de44fdb.jpg  ">

    <source src=" https://cdn.videy.co/69Yjjtlg1.mp4 " type="video/mp4">
  </video>

  <!-- Overlay tombol -->
  <div class="overlay" id="overlayBtn">

    <!-- PLAY -->
    <svg id="playIcon" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="38" fill="rgba(0,0,0,0.6)"/>
      <polygon points="32,24 60,40 32,56" fill="#fff"/>
    </svg>

    <!-- PAUSE -->
    <svg id="pauseIcon" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="38" fill="rgba(0,0,0,0.6)"/>
      <rect x="28" y="24" width="8" height="32" fill="#fff"/>
      <rect x="44" y="24" width="8" height="32" fill="#fff"/>
    </svg>

  </div>
</div>

</div>

<!-- ========================= -->
<!-- BANNER BAWAH -->
<!-- ========================= -->
<div class="bottom-ad">
 

<!-- ========================= -->
<!-- SCRIPT VIDEO CONTROL -->
<!-- ========================= -->
<script>
const video = document.getElementById("myVideo");
const overlay = document.getElementById("overlayBtn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");

// toggle play/pause
function toggleVideo() {
  if (video.paused) {
    video.play();
  } else {
    video.pause();
  }
}

// klik overlay
overlay.addEventListener("click", toggleVideo);

// klik video
video.addEventListener("click", toggleVideo);

// saat play
video.addEventListener("play", () => {
  playIcon.style.display = "none";
  pauseIcon.style.display = "block";

  setTimeout(() => {
    overlay.classList.add("hide");
  }, 800);
});

// saat pause
video.addEventListener("pause", () => {
  overlay.classList.remove("hide");
  playIcon.style.display = "block";
  pauseIcon.style.display = "none";
});

// hover
video.parentElement.addEventListener("mouseenter", () => {
  overlay.classList.remove("hide");
});

video.parentElement.addEventListener("mouseleave", () => {
  if (!video.paused) {
    overlay.classList.add("hide");
  }
});

// disable fullscreen paksa
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  }
});
</script>
